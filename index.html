<!DOCTYPE html>
<html>
<body>

<h2>NexusChat</h2>

<input id="username" placeholder="Username" value="luis">
<button onclick="connect()">Conectar</button>

<br><br>

<input id="msg" placeholder="Mensagem">
<button onclick="sendMsg()">Enviar</button>

<p id="typing"></p>

<h3>Online:</h3>
<ul id="online"></ul>

<h3>Mensagens:</h3>
<ul id="messages"></ul>

<script>

let ws;

const room = "geral";

function connect() {

    const username = document.getElementById("username").value;

    ws = new WebSocket("ws://localhost:8765");

    ws.onopen = () => {

        console.log("Conectado!");

        ws.send(JSON.stringify({
            type: "join_room",
            username: username,
            displayName: username,
            roomId: room
        }));
    };

    ws.onmessage = (event) => {

        const data = JSON.parse(event.data);

        console.log(data);

        // histórico
        if (data.type === "history") {

            data.messages.forEach(msg => {

                addMessage(
                    `[HIST] ${msg.displayName}: ${msg.text}`
                );
            });
        }

        // mensagem normal
        else if (data.type === "message") {

            addMessage(
                `${data.displayName}: ${data.text}`
            );
        }

        // entrou
        else if (data.type === "user_joined") {

            addMessage(
                `[JOIN] ${data.displayName} entrou`
            );
        }

        // saiu
        else if (data.type === "user_left") {

            addMessage(
                `[LEAVE] ${data.displayName} saiu`
            );
        }

        // digitando
        else if (data.type === "typing") {

            document.getElementById("typing").innerText =
                `${data.username} está digitando...`;
        }

        else if (data.type === "stop_typing") {

            document.getElementById("typing").innerText = "";
        }

        // online users
        else if (data.type === "online_users") {

            const onlineList = document.getElementById("online");

            onlineList.innerHTML = "";

            data.users.forEach(user => {

                const li = document.createElement("li");

                li.textContent = user;

                onlineList.appendChild(li);
            });
        }

        // erro
        else if (data.type === "error") {

            alert(data.message);
        }
    };

    // typing event
    const input = document.getElementById("msg");

    input.addEventListener("input", () => {

        ws.send(JSON.stringify({
            type: "typing",
            username: username,
            roomId: room
        }));

        clearTimeout(window.typingTimeout);

        window.typingTimeout = setTimeout(() => {

            ws.send(JSON.stringify({
                type: "stop_typing",
                username: username,
                roomId: room
            }));

        }, 1000);
    });
}

function addMessage(text) {

    const li = document.createElement("li");

    li.textContent = text;

    document.getElementById("messages").appendChild(li);
}

function sendMsg() {

    const input = document.getElementById("msg");

    const username = document.getElementById("username").value;

    ws.send(JSON.stringify({
        type: "message",
        username: username,
        displayName: username,
        roomId: room,
        text: input.value,
        ts: Date.now()
    }));

    input.value = "";
}

</script>

</body>
</html>
