<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- =========================================================
       TELA 1: LOGIN / REGISTRO
  ========================================================= -->
  <div id="screen-login">
    <div class="login-card">

      <div class="login-header">
        <div class="logo">Nexus<span>Chat</span></div>
        <div class="tagline">Comunicação em tempo real</div>
      </div>

      <!-- Abas Login / Registrar -->
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrar</div>
      </div>

      <!-- Formulário de Login -->
      <div id="form-login" class="login-form">
        <div class="form-group">
          <label for="login-username">Usuário</label>
          <input type="text" id="login-username" placeholder="seu_nick" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">
          <span id="login-spinner" class="spinner hidden"></span>
          Entrar no sistema
        </button>
      </div>

      <!-- Formulário de Registro -->
      <div id="form-register" class="login-form hidden">
        <div class="form-group">
          <label for="reg-username">Escolha seu nome de usuário</label>
          <input type="text" id="reg-username" placeholder="seu_nick" maxlength="20" />
        </div>
        <div class="form-group">
          <label for="reg-display">Nome de exibição</label>
          <input type="text" id="reg-display" placeholder="Seu Nome" maxlength="30" />
        </div>
        <div class="form-group">
          <label for="reg-password">Senha</label>
          <input type="password" id="reg-password" placeholder="mínimo 6 caracteres" />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirmar senha</label>
          <input type="password" id="reg-confirm" placeholder="repita a senha" />
        </div>
        <div id="reg-error" class="error-msg hidden"></div>
        <button class="btn btn-primary" id="btn-register" onclick="handleRegister()">Criar conta</button>
      </div>

      <div class="login-footer">
        <span class="cursor">Sistema criptografado e seguro</span>
      </div>

    </div>
  </div><!-- /screen-login -->


  <!-- =========================================================
       TELA 2: LOBBY — seleção de salas
  ========================================================= -->
  <div id="screen-lobby" class="hidden">

    <div class="topbar">
      <div class="topbar-left">
        <div class="logo" style="font-size:20px">Nexus<span>Chat</span></div>
        <div class="conn-status">
          <div class="conn-dot ok" id="lobby-conn-dot"></div>
          <span id="lobby-conn-text">Conectado</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user-chip">
          <div class="user-avatar" id="lobby-avatar">?</div>
          <span id="lobby-username">usuário</span>
        </div>
        <button class="btn btn-ghost" onclick="handleLogout()" style="padding:7px 14px;font-size:12px">
          Sair
        </button>
      </div>
    </div>

    <div class="lobby-content">
      <div class="lobby-title">Salas disponíveis</div>
      <div class="lobby-subtitle">Selecione uma sala para entrar ou crie a sua própria</div>

      <!-- Criar sala -->
      <div class="create-room-bar">
        <div class="form-group">
          <label>Nova sala</label>
          <input type="text" id="new-room-name" placeholder="Nome da sala..." maxlength="30"
                 onkeydown="if(event.key==='Enter') createRoom()" />
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()" style="margin-bottom:0">
          + Criar sala
        </button>
      </div>

      <!-- Lista de salas -->
      <div class="rooms-grid" id="rooms-grid">
        <!-- preenchido via JS -->
      </div>
    </div>

  </div><!-- /screen-lobby -->


  <!-- =========================================================
       TELA 3: CHAT — sala ativa
  ========================================================= -->
  <div id="screen-chat" class="hidden">

    <div class="chat-header">
      <div class="chat-header-left">
        <button class="btn-back" onclick="leaveRoom()" title="Voltar ao lobby">←</button>
        <div style="font-size:20px" id="chat-room-icon">💬</div>
        <div class="chat-room-info">
          <div class="chat-room-name" id="chat-room-name">Geral</div>
          <div class="chat-room-status">
            <span class="badge badge-online">
              <span class="dot live"></span>
              <span id="chat-member-count">0</span> online
            </span>
          </div>
        </div>
      </div>
      <div class="chat-header-right">
        <div class="conn-status">
          <div class="conn-dot ok" id="chat-conn-dot"></div>
          <span id="chat-conn-text">Ao vivo</span>
        </div>
        <div class="user-chip">
          <div class="user-avatar" id="chat-avatar">?</div>
          <span id="chat-username">user</span>
        </div>
      </div>
    </div>

    <div class="chat-body">

      <!-- Sidebar: membros online -->
      <div class="sidebar">
        <div class="sidebar-title">Membros online</div>
        <div class="member-list" id="member-list">
          <!-- preenchido via JS -->
        </div>
      </div>

      <!-- Área de mensagens -->
      <div class="messages-area">
        <div class="messages-list" id="messages-list">
          <!-- mensagens aparecem aqui -->
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typing-indicator">
          <!-- preenchido via JS quando alguém digita -->
        </div>

        <!-- Input de mensagem -->
        <div class="input-bar">
          <div class="input-wrap">
            <textarea
              id="msg-input"
              placeholder="Digite sua mensagem..."
              rows="1"
              onkeydown="handleMsgKey(event)"
              oninput="autoResize(this); handleTyping()"
            ></textarea>
          </div>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar (Enter)">
            ➤
          </button>
        </div>
      </div>

    </div>

  </div><!-- /screen-chat -->

</div><!-- /app -->


<!-- Modal: Criar sala -->
<div class="overlay hidden" id="modal-create-room">
  <div class="modal">
    <div class="modal-title">Criar nova sala</div>
    <div class="modal-form">
      <div class="form-group">
        <label>Nome da sala</label>
        <input type="text" id="modal-room-name" placeholder="ex: frontend-devs" maxlength="30" />
      </div>
      <div class="form-group">
        <label>Descrição (opcional)</label>
        <input type="text" id="modal-room-desc" placeholder="Sobre o que é essa sala?" maxlength="80" />
      </div>
      <div class="form-group">
        <label>Ícone</label>
        <div class="emoji-picker" id="emoji-picker">
          <!-- gerado via JS -->
        </div>
      </div>
      <div id="create-room-error" class="error-msg hidden"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeCreateModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitCreateRoom()">Criar sala</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>


<!-- ============================================================
     JAVASCRIPT PRINCIPAL
     Lógica de UI, gerenciamento de estado e integração WebSocket
============================================================ -->
<script src="app.js"></script>


</body>
</html>
